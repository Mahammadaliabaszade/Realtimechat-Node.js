<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk=" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <title>ChatCord — Real-time Chat</title>
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="chat-header-left">
        <i class="fas fa-comments"></i>
        <h1>ChatCord</h1>
      </div>
      <a id="leave-btn" class="btn btn-leave"><i class="fas fa-sign-out-alt"></i> Leave Room</a>
    </header>

    <main class="chat-main">
      <div class="chat-sidebar">
        <div class="sidebar-section">
          <h3><i class="fas fa-door-open"></i> Room</h3>
          <h2 id="room-name"></h2>
        </div>
        <div class="sidebar-section">
          <h3><i class="fas fa-users"></i> Online</h3>
          <ul id="users"></ul>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>
    </main>

    <div class="chat-form-container">
      <form id="chat-form">
        <input id="msg" type="text" placeholder="Type a message..." required autocomplete="off" />
        <button class="btn btn-send"><i class="fas fa-paper-plane"></i></button>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.9.2/qs.min.js" integrity="sha256-TDxXjkAUay70ae/QJBEpGKkpVslXaHHayklIVglFRT4=" crossorigin="anonymous"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
