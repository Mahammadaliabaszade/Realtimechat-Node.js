<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk=" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <title>ChatCord — Real-time Chat</title>
</head>
<body>
  <div class="join-container">
    <div class="join-card">
      <div class="join-header">
        <div class="join-logo">
          <i class="fas fa-comments"></i>
        </div>
        <h1>ChatCord</h1>
        <p>Connect and chat in real-time</p>
      </div>
      <main class="join-main">
        <form action="chat.html">
          <div class="form-control">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username..." required autocomplete="off" />
          </div>
          <div class="form-control">
            <label for="room"><i class="fas fa-door-open"></i> Select Room</label>
            <select name="room" id="room">
              <option value="JavaScript">JavaScript</option>
              <option value="Python">Python</option>
              <option value="PHP">PHP</option>
              <option value="C#">C#</option>
              <option value="Ruby">Ruby</option>
              <option value="Java">Java</option>
            </select>
          </div>
          <button type="submit" class="btn">Join Room <i class="fas fa-arrow-right"></i></button>
        </form>
      </main>
    </div>
  </div>
</body>
</html>
